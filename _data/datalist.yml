############# Materials #############

- title: Open Molecular Crystals 2025 (OMC25)
  category: Materials
  description: "Over 27 million molecular crystal structures from DFT relaxations of 230,000+ randomly generated structures across 50,000 organic molecules. Released with machine-learned interatomic potentials."
  image: omc25.webp
  data_url: https://huggingface.co/facebook/OMC25
  project_url: https://arxiv.org/abs/2508.02651
  code_url: https://github.com/facebookresearch/fairchem

- title: Open DAC 2023 & 2025
  category: Materials
  description: "Datasets for sorbent discovery in Direct Air Capture. ODAC23 provides 40M DFT calculations across 170K MOF relaxations; ODAC25 expands to 60M calculations across 15,000 MOFs with four adsorbate species. Released with machine-learned interatomic potentials."
  image: odac25.webp
  data_url: https://huggingface.co/facebook/ODAC25
  project_url: https://open-dac.github.io/
  code_url: https://github.com/facebookresearch/fairchem

- title: Open Catalyst 2020 & 2022 (OC20, OC22)
  category: Materials
  description: "Datasets for catalyst discovery to enable renewable energy storage. OC20 and OC22 together contain 1.3 million molecular relaxations from over 260 million DFT calculations. Released with baseline models and code."
  image: ocp.webp
  data_url: https://github.com/Open-Catalyst-Project/ocp/blob/main/DATASET.md
  project_url: https://opencatalystproject.org/
  code_url: https://github.com/facebookresearch/fairchem

############# MRI Acceleration #############

- title: fastMRI Datasets
  category: MRI Acceleration
  description: "Large-scale dataset of raw MRI measurements for AI-accelerated reconstruction. Contains 1,500 fully sampled knee MRIs, 7,000 fully sampled brain MRIs, and DICOM images from 10,000 clinical knee exams."
  image: fastmri.webp
  data_url: https://fastmri.med.nyu.edu/
  project_url: https://fastmri.org/
  code_url: https://github.com/facebookresearch/fastMRI/

############# Speech Recognition #############

- title: Multilingual LibriSpeech (MLS)
  category: Speech Recognition
  description: "50K hours of labeled speech across 8 languages, derived from LibriVox audiobooks. Includes language models and baseline ASR models for all languages."
  image: mls.webp
  data_url: https://www.openslr.org/94/
  code_url: https://github.com/flashlight/wav2letter/tree/main/recipes/mls
